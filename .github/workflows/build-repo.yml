name: Build and Publish XBPS Repository

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Give the Action permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
      volumes:
        - /dev:/dev

    steps:
      - name: Prepare container
        run: |
          xbps-install -Syu xbps
          xbps-install -yu
          xbps-install -y sudo bash grep curl git openssl xz
          useradd -G xbuilder -M builder

      - name: Checkout custom packages
        uses: actions/checkout@v7
        with:
          path: "scientios-repo"

      - name: Clone void-packages
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git void-packages
          chown -R builder:builder void-packages

      - name: Bootstrap xbps-src
        run: |
          cd void-packages
          echo "XBPS_CHROOT_CMD=uchroot" >> etc/conf
          echo "XBPS_ALLOW_RESTRICTED=yes" >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Inject custom packages
        run: cp -r scientios-repo/srcpkgs/* void-packages/srcpkgs/

      - name: Build custom packages
        run: |
          cd void-packages
          for pkg in ../scientios-repo/srcpkgs/*/; do
            pkgname=$(basename "$pkg")
            echo "Building $pkgname..."
            sudo -Eu builder ./xbps-src -A x86_64 pkg "$pkgname"
          done

      - name: Setup Private Key
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > privkey.pem
          chmod 600 privkey.pem

      - name: Sign packages and generate index
        run: |
          REPO_DIR="void-packages/hostdir/binpkgs"
          # Sign all built .xbps files recursively
          find $REPO_DIR -name "*.xbps" -exec xbps-rindex --sign-pkg --privkey privkey.pem {} +
          
          # Sign the repository metadata for the main repo and any sub-repos (like nonfree)
          for dir in $(find $REPO_DIR -type d); do
            # Only generate index if there are .xbps files in this specific directory
            if ls $dir/*.xbps 1> /dev/null 2>&1; then
              xbps-rindex --sign --signedby "ScientiOS" --privkey privkey.pem $dir
            fi
          done
          
          # Clean up the key
          rm -f privkey.pem

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "void-packages/hostdir/binpkgs"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5